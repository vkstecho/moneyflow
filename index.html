// PDF IMPORT (Axio format)
function importPDF(){
  var inp=document.createElement("input");inp.type="file";inp.accept=".pdf";
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    toast("Processing PDF...");
    var reader=new FileReader();
    reader.onload=function(ev){
      var data=new Uint8Array(ev.target.result);
      if(!window.pdfjsLib){toast("PDF.js not loaded");return}
      pdfjsLib.getDocument({data:data}).promise.then(function(pdf){
        var allText="";var promises=[];
        for(var i=1;i<=pdf.numPages;i++){
          promises.push(pdf.getPage(i).then(function(page){
            return page.getTextContent().then(function(tc){
              return tc.items.map(function(it){return it.str}).join(" ");
            })
          }))
        }
        Promise.all(promises).then(function(pages){
          allText=pages.join("\n");
          parseAxio(allText);
        });
      }).catch(function(e){toast("Error reading PDF: "+e.message)});
    };
    reader.readAsArrayBuffer(file);
  };
  inp.click();
}

function parseAxio(text){
  // Find all transaction-like patterns
  var dateRe=/(\d{4}-\d{2}-\d{2})\s+\d{2}:\d{2}/g;
  var lines=text.split("\n");var fullText=text;
  // Find amounts with DR/CR pattern
  var txRe=/([\d,]+(?:\.\d+)?)\s+(DR|CR)\s+/g;
  var matches=[];var m;
  // Find all DR/CR entries with surrounding context
  while((m=txRe.exec(fullText))!==null){
    var start=Math.max(0,m.index-200);
    var end=Math.min(fullText.length,m.index+300);
    var ctx=fullText.substring(start,end);
    // Find date
    var dMatch=ctx.match(/(\d{4}-\d{2}-\d{2})/);
    var date=dMatch?dMatch[1]:"";
    // Amount
    var amt=parseFloat(m[1].replace(/,/g,""));
    var type=m[2]==="CR"?"income":"expense";
    // Find category - look for known categories after DR/CR
    var afterDR=fullText.substring(m.index,m.index+300);
    var cat="other";
    var catNames=Object.keys(AXIO_MAP);
    catNames.sort(function(a,b){return b.length-a.length});
    for(var i=0;i<catNames.length;i++){
      if(afterDR.toUpperCase().indexOf(catNames[i])!==-1){
        cat=AXIO_MAP[catNames[i]];break;
      }
    }
    // Find place/note - text before amount
    var beforeAmt=fullText.substring(Math.max(0,m.index-150),m.index);
    var noteMatch=beforeAmt.match(/([A-Z][A-Z\s&@.\-]+?)\s+[\d,]+/);
    var note=noteMatch?noteMatch[1].trim():"";
    if(note.length>50)note=note.slice(-50);
    if(amt>0&&date){
      matches.push({date:date,amount:amt,type:type,category:cat,note:note});
    }
  }
  // Deduplicate
  var seen={};var unique=[];
  matches.forEach(function(m){
    var key=m.date+"-"+m.amount+"-"+m.type;
    if(!seen[key]){seen[key]=true;unique.push(m)}
  });
  // Add to transactions
  var added=0;
  unique.forEach(function(m){
    // Check if already exists
    var exists=D.transactions.some(function(t){return t.date===m.date&&t.amount===m.amount&&t.type===m.type});
    if(!exists){
      D.transactions.push({id:uid(),type:m.type,amount:m.amount,category:m.category,note:m.note,date:m.date,createdAt:Date.now(),imported:true});
      added++;
    }
  });
  // Sort by date desc
  D.transactions.sort(function(a,b){return(b.date||"").localeCompare(a.date||"")});
  sv();
  toast("Imported "+added+" transactions!");
  cM();rC();
}
