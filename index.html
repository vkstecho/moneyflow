.pin-key:active{transform:scale(.92);background:#EDE7F6}
.pin-dots{display:flex;justify-content:center;gap:14px;margin:20px 0}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid #ddd;transition:.2s}
.pin-dot.f{background:#3E277A;border-color:#3E277A}
.cust-cat-row{display:flex;gap:8px;align-items:center;background:var(--card);padding:10px;border-radius:12px;margin-bottom:6px}

.empty-illust{font-size:80px;margin-bottom:16px;opacity:.5}
/* Phase 3 - Analytics */
.stat-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:14px}
.stat-card{background:var(--card);border-radius:14px;padding:14px;box-shadow:0 1px 6px var(--shadow)}
.stat-label{font-size:10px;color:var(--text-muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.stat-value{font-size:18px;font-weight:700;margin-top:4px;color:var(--text)}
.stat-change{font-size:11px;margin-top:2px}
.stat-up{color:#E53935}.stat-down{color:#2E7D32}
.tag{display:inline-block;background:#EDE7F6;color:#6A4BBC;font-size:10px;font-weight:600;padding:2px 8px;border-radius:10px;margin:2px 2px 0 0}
[data-theme="dark"] .tag{background:#252836;color:#a98bff}
.tag-input{display:flex;flex-wrap:wrap;gap:4px;background:var(--card);border:1.5px solid var(--border);border-radius:12px;padding:6px;min-height:42px;align-items:center}
.tag-pill{background:#EDE7F6;color:#6A4BBC;padding:4px 10px;border-radius:14px;font-size:12px;font-weight:600;display:flex;align-items:center;gap:4px}
.tag-pill button{background:none;border:none;color:#6A4BBC;cursor:pointer;font-size:14px;padding:0;line-height:1}
.tag-input input{flex:1;border:none;background:none;outline:none;padding:6px;min-width:80px;color:var(--text)}
.receipt-thumb{width:60px;height:60px;border-radius:10px;object-fit:cover;cursor:pointer;border:2px solid var(--border)}
.receipt-modal{position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.receipt-modal img{max-width:100%;max-height:90vh;border-radius:12px}
.receipt-modal .close{position:absolute;top:20px;right:20px;background:#fff;border:none;width:40px;height:40px;border-radius:50%;font-size:24px;cursor:pointer}
.curr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.curr-btn{padding:14px 10px;border-radius:12px;border:2px solid var(--border);background:var(--card);cursor:pointer;text-align:center;color:var(--text)}
.curr-btn.a{border-color:#3E277A;background:#EDE7F6}
[data-theme="dark"] .curr-btn.a{background:#2a1f4a}
.curr-sym{font-size:24px;font-weight:700;color:#3E277A}
.curr-name{font-size:11px;color:var(--text-muted);margin-top:2px}

.fy-card{background:linear-gradient(145deg,#1a237e,#283593);border-radius:20px;padding:20px;margin-bottom:14px;color:#fff;position:relative;overflow:hidden}
.fy-card .sp{position:absolute;width:120px;height:120px;border-radius:50%;top:-30px;right:-20px;background:radial-gradient(circle,rgba(255,255,255,.06),transparent 70%)}
.fy-label{font-size:11px;opacity:.6;font-weight:600;text-transform:uppercase;letter-spacing:1px}
.fy-year{font-size:24px;font-weight:700;margin:4px 0}
.fy-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-top:14px}
.fy-stat{background:rgba(255,255,255,.08);border-radius:12px;padding:10px}
.fy-stat-label{font-size:10px;opacity:.6}
.fy-stat-val{font-size:15px;font-weight:700;margin-top:2px}
.itr-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:0 2px 8px var(--shadow)}
.itr-status{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:10px}
.itr-filed{background:#E8F5E9;color:#2E7D32}
.itr-pending{background:#FFF3E0;color:#E65100}
.itr-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border)}
.itr-row:last-child{border-bottom:none}
.itr-row-label{font-size:13px;color:var(--text-muted)}
.itr-row-val{font-size:13px;font-weight:600;color:var(--text)}

/* ITR Private Section */
.itr-lock-screen{text-align:center;padding:40px 20px}
.itr-lock-icon{font-size:80px;margin-bottom:16px;opacity:.7}
.itr-lock-title{font-size:20px;font-weight:700;color:var(--text);margin-bottom:8px}
.itr-lock-sub{color:var(--text-muted);font-size:14px;margin-bottom:24px}
.itr-upload-zone{border:2px dashed #6A4BBC;border-radius:16px;padding:32px 20px;text-align:center;cursor:pointer;background:linear-gradient(135deg,rgba(62,39,122,.05),rgba(106,75,188,.05));margin:16px 0}
.itr-upload-zone:hover{background:linear-gradient(135deg,rgba(62,39,122,.1),rgba(106,75,188,.1))}
.itr-income-row{background:var(--card);border-radius:12px;padding:12px;margin-bottom:6px;display:flex;align-items:center;gap:10px;box-shadow:0 1px 4px var(--shadow)}
.itr-income-period{flex:1;font-size:13px;font-weight:600;color:var(--text)}
.itr-income-amt{font-weight:700;color:#2E7D32;font-size:14px}
.itr-income-note{font-size:11px;color:var(--text-muted);margin-top:2px}
.itr-exempt-row{background:#FFF3E0;border-left:3px solid #FF9800;border-radius:10px;padding:10px 12px;margin-bottom:6px}
[data-theme="dark"] .itr-exempt-row{background:#2d2416}
.itr-deduct-row{background:#E8F5E9;border-left:3px solid #2E7D32;border-radius:10px;padding:10px 12px;margin-bottom:6px}
[data-theme="dark"] .itr-deduct-row{background:#14281d}
.itr-section-label{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:8px;background:rgba(62,39,122,.1);color:#6A4BBC;margin-bottom:4px}
.itr-calc-card{background:linear-gradient(135deg,#1a237e,#283593);color:#fff;border-radius:16px;padding:18px;margin-bottom:12px}
.itr-calc-row{display:flex;justify-content:space-between;padding:6px 0;font-size:13px}
.itr-calc-row.total{border-top:1px solid rgba(255,255,255,.3);margin-top:8px;padding-top:10px;font-weight:700;font-size:16px}
.hra-calc-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin:10px 0}
.hra-calc-row{display:flex;justify-content:space-between;font-size:12px;margin:4px 0;color:var(--text-muted)}
.hra-calc-result{background:#EDE7F6;border-radius:8px;padding:10px;margin-top:10px;text-align:center;font-weight:700;color:#3E277A}
.timeline-card{background:var(--card);border-radius:14px;padding:14px;margin-bottom:10px;box-shadow:0 2px 6px var(--shadow);position:relative;padding-left:50px}
.timeline-year{position:absolute;left:10px;top:14px;width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#3E277A,#6A4BBC);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.timeline-period{font-size:13px;font-weight:600;color:var(--text)}
.timeline-source{font-size:11px;color:var(--text-muted);margin-top:2px}
.timeline-grid{display:flex;gap:8px;margin-top:8px;font-size:11px}
.timeline-stat{flex:1}.timeline-stat-label{color:var(--text-muted)}.timeline-stat-val{font-weight:700;color:var(--text)}
.cashback-row{background:var(--card);border-radius:12px;padding:12px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 1px 4px var(--shadow)}
.itr-note-expand{background:rgba(255,193,7,.1);border-left:3px solid #FFC107;padding:8px 12px;margin-top:6px;border-radius:6px;font-size:12px;color:var(--text-muted);white-space:pre-wrap}
.itr-sub-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px}
.itr-sub-tab{padding:8px 16px;border-radius:20px;background:var(--card);border:1px solid var(--border);color:var(--text-muted);font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap}
.itr-sub-tab.a{background:#3E277A;color:#fff;border-color:#3E277A}

.notif-banner{background:linear-gradient(135deg,#FF9800,#F57C00);color:#fff;padding:14px 16px;border-radius:14px;margin-bottom:16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.premium-badge{background:linear-gradient(135deg,#FFD700,#FFA000);color:#000;font-size:9px;font-weight:700;padding:2px 8px;border-radius:10px;text-transform:uppercase;margin-left:6px}
.report-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:12px;box-shadow:0 1px 6px var(--shadow)}
.report-bar{display:flex;align-items:center;gap:8px;margin:6px 0}
.report-bar-name{font-size:12px;flex-shrink:0;width:90px;color:var(--text)}
.report-bar-track{flex:1;height:8px;background:#f0f0f0;border-radius:4px;overflow:hidden}
[data-theme="dark"] .report-bar-track{background:#252836}
.report-bar-fill{height:8px;border-radius:4px;transition:width .6s}
.report-bar-val{font-size:11px;font-weight:600;color:var(--text);width:60px;text-align:right}



</style>
</head>

// BIOMETRIC LOGIN (WebAuthn)
function isBiometricSupported(){return window.PublicKeyCredential!==undefined&&navigator.credentials!==undefined}
function isBiometricEnabled(){return localStorage.getItem("mf_bio_id")!==null}
function setupBiometric(){
  if(!isBiometricSupported()){toast("Biometric not supported on this device");return}
  if(!ad||!ad.phone){toast("Please login first");return}
  var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
  var userId=new TextEncoder().encode(ad.phone);
  navigator.credentials.create({
    publicKey:{
      challenge:challenge,
      rp:{name:"MoneyFlow",id:window.location.hostname},
      user:{id:userId,name:ad.phone,displayName:ad.name||"User"},
      pubKeyCredParams:[{alg:-7,type:"public-key"},{alg:-257,type:"public-key"}],
      authenticatorSelection:{authenticatorAttachment:"platform",userVerification:"required"},
      timeout:60000,
      attestation:"none"
    }
  }).then(function(cred){
    var idArr=Array.from(new Uint8Array(cred.rawId));
    localStorage.setItem("mf_bio_id",JSON.stringify(idArr));
    localStorage.setItem("mf_bio_user",JSON.stringify(ad));
    toast("\u{1F510} Fingerprint enabled!");rM();
  }).catch(function(e){toast("Setup failed: "+(e.message||"cancelled"))});
}
function loginBiometric(){
  if(!isBiometricSupported()||!isBiometricEnabled()){toast("Biometric not available");return}
  var idArr=JSON.parse(localStorage.getItem("mf_bio_id"));
  var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
  navigator.credentials.get({
    publicKey:{
      challenge:challenge,
      allowCredentials:[{id:new Uint8Array(idArr),type:"public-key"}],
      userVerification:"required",
      timeout:60000
    }
  }).then(function(){
    var bioUser=JSON.parse(localStorage.getItem("mf_bio_user"));
    ad=bioUser;ad["in"]=true;
    localStorage.setItem(AK,JSON.stringify(ad));
    toast("Welcome back!");goApp();
  }).catch(function(e){toast("Authentication failed")});
}
function disableBiometric(){
  if(confirm("Disable fingerprint login?")){
    localStorage.removeItem("mf_bio_id");
    localStorage.removeItem("mf_bio_user");
    toast("Fingerprint disabled");rM();
  }
}

// ===== FIREBASE STORAGE UPLOAD =====
function uploadITRFile(){
  if(!fbOk||!uid){toast("Please login first");return}
  var inp=document.createElement("input");
  inp.type="file";inp.accept=".xlsx,.xls";
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    if(file.size>5*1024*1024){toast("File too large (max 5MB)");return}
    toast("Uploading to cloud...");
    var path="users/"+uid+"/itr/"+file.name;
    var ref=storage.ref(path);
    ref.put(file).then(function(snap){
      return snap.ref.getDownloadURL();
    }).then(function(url){
      D.itrFile={url:url,uploadedAt:Date.now(),fileName:file.name,path:path};
      sv();
      // Parse it immediately
      parseITRFile(file);
    }).catch(function(e){
      toast("Upload failed: "+e.message);
    });
  };
  inp.click();
}

function fetchITRFromCloud(){
  if(!D.itrFile||!D.itrFile.url||!storage){toast("No file uploaded");return}
  toast("Fetching from cloud...");
  fetch(D.itrFile.url).then(function(res){return res.blob()}).then(function(blob){
    parseITRFile(blob);
  }).catch(function(e){toast("Fetch failed: "+e.message)});
}

function deleteITRFile(){
  if(!D.itrFile){toast("No file to delete");return}
  if(!confirm("Delete uploaded Excel file?"))return;
  if(D.itrFile.path&&storage){
    storage.ref(D.itrFile.path).delete().catch(function(){});
  }
  D.itrFile=null;D.itrData={fyData:{},earnings:[],cashback:[],locked:true};
  sv();toast("Deleted");rC();
}

// ===== EXCEL PARSER =====
function parseITRFile(file){
  if(!window.XLSX){toast("Excel library not loaded");return}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:"array"});
      var parsed={fyData:{},earnings:[],cashback:[],locked:true};
      
      wb.SheetNames.forEach(function(sn){
        var ws=wb.Sheets[sn];
        var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:""});
        var lower=sn.toLowerCase();
        
        if(lower.indexOf("earning")>-1||lower.indexOf("expense")>-1){
          parsed.earnings=parseEarningsSheet(rows,ws);
        }else if(lower.indexOf("cashback")>-1||lower.indexOf("paytm")>-1||lower.indexOf("card")>-1){
          parsed.cashback=parseCashbackSheet(rows);
        }else{
          // Treat as FY data sheet
          var fyData=parseFYSheet(rows,ws,sn);
          Object.assign(parsed.fyData,fyData);
        }
      });
      
      D.itrData=parsed;
      sv();
      toast("Parsed "+Object.keys(parsed.fyData).length+" FYs, "+parsed.earnings.length+" years, "+parsed.cashback.length+" months");
      rC();
    }catch(err){
      toast("Parse error: "+err.message);
      console.error(err);
    }
  };
  if(file instanceof Blob)reader.readAsArrayBuffer(file);
  else reader.readAsArrayBuffer(file);
}

// Parse FY sheet (Fin. Year 2024-25 style)
function parseFYSheet(rows,ws,sheetName){
  var fys={};var currentFY=null;
  var mode=null; // income | deduction
  
  for(var i=0;i<rows.length;i++){
    var r=rows[i];var r0=(r[0]||"").toString().trim();
    
    // Detect FY header
    var fyMatch=r0.match(/Financial\s*Year\s*(\d{4})[-\s]*(\d{2,4})/i)||r0.match(/FY\s*(\d{4})[-\s]*(\d{2,4})/i)||r0.match(/(\d{4})[-\s]*(\d{2,4})\s*(?:FY|Tax|Year)/i);
    if(fyMatch){
      var y1=fyMatch[1];var y2=fyMatch[2].length===2?fyMatch[2]:fyMatch[2].slice(-2);
      currentFY=y1+"-"+y2;
      fys[currentFY]={fy:currentFY,incomes:[],exemptions:[],deductions:[],totals:{},hra:{},notes:""};
      continue;
    }
    
    if(!currentFY)continue;
    var fy=fys[currentFY];
    
    // Skip header rows
    if(r0.toLowerCase()==="period"||r0.toLowerCase().indexOf("total")===0){
      if(r0.toLowerCase().indexOf("total")===0){
        fy.totals.income=parseNum(r[1]);
        fy.totals.exemption=parseNum(r[2]);
        fy.totals.deduction=parseNum(r[11])||parseNum(r[4]);
      }
      continue;
    }
    if(r0.toLowerCase().indexOf("taxable")===0){
      fy.totals.taxable=parseNum(r[1]);continue;
    }
    if(r0.toLowerCase().indexOf("hra")===0){
      fy.hra.claim=parseNum(r[3]);continue;
    }
    
    // Income rows (Salary JPFL, Mutual Fund Interest, etc.)
    if(r0&&(r[1]||r[2])){
      var income=parseNum(r[1]);
      var exempt=parseNum(r[2]);
      if(income>0){
        var note=getCellNote(ws,i+1,0)||getCellNote(ws,i+1,1);
        fy.incomes.push({period:r0,amount:income,source:r0,note:note});
      }
    }
    
    // Exemption entries (Section + Head columns)
    if(r[3]&&r[4]){
      var sec=(r[3]||"").toString().trim();
      var head=(r[4]||"").toString().trim();
      if(sec&&head){
        var note=getCellNote(ws,i+1,4);
        fy.exemptions.push({section:sec,head:head,amount:parseNum(r[2]),note:note});
      }
    }
    
    // Deduction entries (columns L=11, M=12, N=13)
    if(r[12]&&r[13]){
      var dsec=(r[12]||"").toString().trim();
      var scheme=(r[13]||"").toString().trim();
      var damt=parseNum(r[11]);
      if(dsec){
        fy.deductions.push({section:dsec,scheme:scheme,amount:damt,note:""});
      }
    }
  }
  return fys;
}

// Parse Earnings sheet (lifetime 1994-2026)
function parseEarningsSheet(rows,ws){
  var out=[];
  for(var i=0;i<rows.length;i++){
    var r=rows[i];
    var year=parseNum(r[0]);
    if(!year||year<1990||year>2050)continue;
    out.push({
      year:year,
      fyPeriod:(r[1]||"").toString(),
      workPeriod:(r[2]||"").toString(),
      earnedActual:parseNum(r[3]),
      earnedInflation:parseNum(r[4]),
      source:(r[5]||"").toString(),
      itrFilled:(r[6]||"").toString(),
      gaveHomeActual:parseNum(r[7]),
      gaveHomeInflation:parseNum(r[8]),
      loanActual:parseNum(r[9]),
      loanInflation:parseNum(r[10]),
      savingsActual:parseNum(r[11]),
      expenseActual:parseNum(r[12]),
      expenseInflation:parseNum(r[13]),
      note:getCellNote(ws,i+1,7)||getCellNote(ws,i+1,3)||getCellNote(ws,i+1,9)||getCellNote(ws,i+1,11)
    });
  }
  return out;
}

// Parse cashback sheet
function parseCashbackSheet(rows){
  var out=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];
    if(!r[0])continue;
    var monthStr=(r[0]||"").toString();
    if(monthStr.toLowerCase().indexOf("total")>-1||!parseNum(r[1]))continue;
    // Parse month from various formats
    var d=new Date(monthStr);
    if(isNaN(d.getTime()))continue;
    out.push({
      month:d.toISOString().slice(0,7),
      monthLabel:d.toLocaleDateString("en-IN",{year:"numeric",month:"short"}),
      earned:parseNum(r[1]),
      charges:parseNum(r[2]),
      rentCharges:parseNum(r[3]),
      net:parseNum(r[4])
    });
  }
  return out.sort(function(a,b){return b.month.localeCompare(a.month)});
}

function parseNum(v){if(v===null||v===undefined||v==="")return 0;var n=parseFloat((""+v).replace(/[,\s]/g,""));return isNaN(n)?0:n}
function getCellNote(ws,row,col){
  try{
    var addr=XLSX.utils.encode_cell({r:row,c:col});
    var cell=ws[addr];
    if(cell&&cell.c&&cell.c.length){return cell.c.map(function(x){return x.t}).join(" ")}
  }catch(e){}
  return "";
}

// ===== HRA CALCULATOR =====
function calcHRA(basic,hraReceived,rentPaid,isMetro){
  if(!basic||!rentPaid)return 0;
  var pct=isMetro?0.5:0.4;
  var actual=hraReceived||0;
  var pctBasic=basic*pct;
  var rentMinus10=rentPaid-(basic*0.1);
  if(rentMinus10<0)rentMinus10=0;
  return Math.min(actual,pctBasic,rentMinus10);
}

function unlockITRBio(){
  if(!isBiometricSupported()||!isBiometricEnabled()){toast("Fingerprint not set up");return}
  var idArr=JSON.parse(localStorage.getItem("mf_bio_id"));
  var challenge=new Uint8Array(32);crypto.getRandomValues(challenge);
  navigator.credentials.get({
    publicKey:{
      challenge:challenge,
      allowCredentials:[{id:new Uint8Array(idArr),type:"public-key"}],
      userVerification:"required",
      timeout:60000
    }
  }).then(function(){
    itrUnlocked=true;toast("Unlocked");rC();
  }).catch(function(){toast("Verification failed")});
}

function unlockITR(){
  if(!isPinSet()){itrUnlocked=true;rC();return}
  verifyPin(function(){itrUnlocked=true;rC()});
}

  var h='<div class="fy-card"><div class="sp"></div>';

function importPDF(){
  var inp=document.createElement("input");inp.type="file";inp.accept=".pdf";
  inp.onchange=function(e){
    var file=e.target.files[0];if(!file)return;
    toast("Processing PDF...");
    var reader=new FileReader();
    reader.onload=function(ev){
      var data=new Uint8Array(ev.target.result);
      if(!window.pdfjsLib){toast("PDF.js not loaded");return}
      pdfjsLib.getDocument({data:data}).promise.then(function(pdf){
        var allText="";var promises=[];
        for(var i=1;i<=pdf.numPages;i++){
          promises.push(pdf.getPage(i).then(function(page){
            return page.getTextContent().then(function(tc){
              return tc.items.map(function(it){return it.str}).join(" ");
            })
          }))
        }
        Promise.all(promises).then(function(pages){
          allText=pages.join("\n");
          parseAxio(allText);
        });
      }).catch(function(e){toast("Error reading PDF: "+e.message)});
    };
    reader.readAsArrayBuffer(file);
  };
  inp.click();
}

function parseAxio(text){
  var fullText=text;
  // Month name to number map
  var MONTHS={jan:"01",feb:"02",mar:"03",apr:"04",may:"05",jun:"06",jul:"07",aug:"08",sep:"09",oct:"10",nov:"11",dec:"12"};
  // Parse various date formats: "15 Jan 2024", "15/01/2024", "2024-01-15", "Jan 15, 2024"
  function parseDate(str){
    var m;
    // ISO: 2024-01-15
    m=str.match(/(\d{4})-(\d{2})-(\d{2})/);
    if(m)return m[1]+"-"+m[2]+"-"+m[3];
    // DD Mon YYYY or DD/Mon/YYYY
    m=str.match(/(\d{1,2})[\/\-\s]+([A-Za-z]{3,9})[\/\-\s,\s]+(\d{4})/);
    if(m){var mo=MONTHS[m[2].slice(0,3).toLowerCase()];if(mo)return m[3]+"-"+mo+"-"+m[1].padStart(2,"0")}
    // Mon DD YYYY or Mon DD, YYYY
    m=str.match(/([A-Za-z]{3,9})[\/\-\s]+(\d{1,2})[\/\-\s,\s]+(\d{4})/);
    if(m){var mo=MONTHS[m[1].slice(0,3).toLowerCase()];if(mo)return m[3]+"-"+mo+"-"+m[2].padStart(2,"0")}
    // DD/MM/YYYY or DD-MM-YYYY
    m=str.match(/(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
    if(m)return m[3]+"-"+m[2].padStart(2,"0")+"-"+m[1].padStart(2,"0");
    return "";
  }
  // Match amounts with DR/CR or Debit/Credit (case-insensitive, full words)
  var txRe=/([\d,]+(?:\.\d{1,2})?)\s+(DR|CR|Debit|Credit)(?:\s|$)/gi;
  var matches=[];var m;
  while((m=txRe.exec(fullText))!==null){
    var start=Math.max(0,m.index-300);
    var end=Math.min(fullText.length,m.index+400);
    var ctx=fullText.substring(start,end);
    // Find date in context window
    var date=parseDate(ctx);
    if(!date)continue;
    var amt=parseFloat(m[1].replace(/,/g,""));
    if(!amt||amt<=0)continue;
    var typeStr=m[2].toUpperCase();
    var type=(typeStr==="CR"||typeStr==="CREDIT")?"income":"expense";
    // Category from text around the match
    var afterDR=fullText.substring(m.index,m.index+400);
    var cat="other";
    var catNames=Object.keys(AXIO_MAP);
    catNames.sort(function(a,b){return b.length-a.length});
    for(var i=0;i<catNames.length;i++){if(afterDR.toUpperCase().indexOf(catNames[i])!==-1){cat=AXIO_MAP[catNames[i]];break}}
    // Note: text before amount, grab a meaningful merchant name
    var beforeAmt=fullText.substring(Math.max(0,m.index-250),m.index);
    var noteMatch=beforeAmt.match(/([A-Za-z][A-Za-z0-9\s&@.\-\/]{3,50?})\s*[\d,]+\s*$/);
    var note=noteMatch?noteMatch[1].trim().replace(/\s+/g," "):"";
    if(note.length>60)note=note.slice(-60);
    matches.push({date:date,amount:amt,type:type,category:cat,note:note||"Axio Import"});
  }
  // Deduplicate by date+amount+type
  var seen={};var unique=[];
  matches.forEach(function(mx){
    var key=mx.date+"-"+mx.amount+"-"+mx.type;
    if(!seen[key]){seen[key]=true;unique.push(mx)}
  });
  if(!unique.length){
    toast("No transactions found. PDF may use image pages or unsupported format.");
    return;
  }
  var added=0;
  unique.forEach(function(mx){
    var exists=D.transactions.some(function(t){return t.date===mx.date&&t.amount===mx.amount&&t.type===mx.type});
    if(!exists){
      D.transactions.push({id:genId(),type:mx.type,amount:mx.amount,category:mx.category,note:mx.note,date:mx.date,createdAt:Date.now(),imported:true});
      added++;
    }
  });
  D.transactions.sort(function(a,b){return(b.date||"").localeCompare(a.date||"")});
  sv();
  toast("Imported "+added+" of "+unique.length+" transactions!");
  cM();rC();
}

// WEB SHARE TARGET + SMS Parser
function parseBankSMSText(text){
  if(!text)return null;
  var t=text.replace(/\n/g," ");
  var isDebit=/debit|debited|spent|paid|sent|withdrawn|purchase/i.test(t);
  var isCredit=/credit|credited|received|deposited|refund/i.test(t);
  if(!isDebit&&!isCredit)return null;
  var amt=0;var m=t.match(/(?:rs\.?|inr|\u20B9)\s*([\d,]+\.?\d*)/i);
  if(m)amt=parseFloat(m[1].replace(/,/g,""));
  if(!amt)return null;
  // Find merchant
  var merchant="";
  var mm=t.match(/(?:at|to|from|paid to|sent to|received from)\s+([A-Za-z0-9\s&.@\-]+?)(?:\s+(?:on|ref|upi|via|txn|amt|rs))/i);
  if(mm)merchant=mm[1].trim().slice(0,40);
  // Auto-categorize
  var cat="other";
  var combined=(merchant+" "+t).toLowerCase();
  var keywords={food:["swiggy","zomato","restaurant","cafe","hotel"],groceries:["bigbasket","blinkit","zepto","dmart","grocery"],shopping:["amazon","flipkart","myntra","ajio","meesho"],bills:["electricity","airtel","jio","vodafone","recharge","bill"],fuel:["petrol","diesel","fuel","hp","bpcl","iocl"],transport:["uber","ola","irctc","metro","cab"],health:["pharmacy","medical","hospital","apollo","medplus"],entertainment:["netflix","hotstar","spotify","movie"],insurance:["insurance","policy","lic","acko"]};
  for(var k in keywords){if(keywords[k].some(function(w){return combined.indexOf(w)>-1})){cat=k;break}}
  if(isCredit){cat=/salary|sal cr/i.test(t)?"salary":"family"}
  return{type:isCredit?"income":"expense",amount:amt,category:cat,note:merchant||"From SMS",date:tdy()};
}
function handleShareTarget(){
  var params=new URLSearchParams(window.location.search);
  if(!params.get("share"))return false;
  var text=params.get("text")||params.get("title")||"";
  if(!text)return false;
  var parsed=parseBankSMSText(text);
  if(!parsed){toast("Could not detect transaction from message");return true}
  // Wait for app to be ready then open modal
  setTimeout(function(){
    if(!ad||!ad["in"]){toast("Please login first to add transaction");return}
    oM("add");
    mS=Object.assign({},mS,parsed,{tags:["from-sms"]});
    rM();
    toast("\u{1F4F2} SMS detected! Review and save");
    // Clear URL params
    window.history.replaceState({},document.title,"/");
  },1000);
  return true;
}
// Quick action shortcuts
function handleQuickAction(){
  var params=new URLSearchParams(window.location.search);
  var act=params.get("action");
  if(!act)return;
  setTimeout(function(){
    if(!ad||!ad["in"])return;
    if(act==="expense"){oM("add");mS.type="expense";rM()}
    else if(act==="income"){oM("add");mS.type="income";rM()}
    else if(act==="reports"){sV("reports")}
    window.history.replaceState({},document.title,"/");
  },1000);
}
